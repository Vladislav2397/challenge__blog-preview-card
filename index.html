<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png" />

        <link
            rel="prefetch"
            href="./assets/images/illustration-article.svg"
            crossorigin />
        <link
            rel="prefetch"
            href="./assets/images/image-avatar.webp"
            crossorigin />

        <link
            rel="prefetch"
            href="./assets/fonts/static/Figtree-Medium.ttf"
            as="font"
            crossorigin />
        <link
            rel="prefetch"
            href="./assets/fonts/static/Figtree-ExtraBold.ttf"
            as="font"
            crossorigin />

        <title>Frontend Mentor | Blog preview card</title>

        <link
            rel="stylesheet"
            href="reset.css" />
        <link
            rel="stylesheet"
            href="style.css" />

        <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
        <style>
            .attribution {
                font-size: 0.6875rem;
                text-align: center;
            }
            .attribution a {
                color: hsl(228, 45%, 44%);
            }
        </style>
    </head>
    <body>
        <main class="container">
            <article class="card">
                <img
                    class="cover"
                    src="./assets/images/illustration-article.svg"
                    alt="Abstract illustration" />
                <div class="content">
                    <p class="tag text-preset-3-bold">Learning</p>
                    <time
                        datetime="2023-12-21"
                        class="date text-preset-3">
                        Published 21 Dec 2023
                    </time>
                    <a href="#">
                        <h1 class="title text-preset-1">
                            HTML & CSS foundations
                        </h1>
                    </a>
                    <p class="description text-preset-2">
                        These languages are the backbone of every website,
                        defining structure, content, and presentation.
                    </p>
                </div>
                <div
                    role="group"
                    aria-labelledby="author-name"
                    class="author">
                    <img
                        class="avatar"
                        src="./assets/images/image-avatar.webp"
                        alt="" />
                    <div
                        id="author-name"
                        class="author-name text-preset-3-bold">
                        Greg Hooper
                    </div>
                </div>
            </article>
        </main>

        <footer class="attribution">
            Challenge by
            <a
                href="https://www.frontendmentor.io/challenges/blog-preview-card-ckPaj01IcS">
                Frontend Mentor
            </a>
            . Coded by
            <a href="https://www.frontendmentor.io/profile/Vladislav2397">
                Vladislav Tregubov
            </a>
            .
        </footer>
    </body>
</html>
